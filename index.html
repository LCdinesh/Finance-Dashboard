<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>FinanceTrack — Personal Dashboard</title>

  <!-- Fonts -->
  https://fonts.googleapis.com
  <link rel="preconnect" href="https:// href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@family=JetBrains+Mono:wght@400;500&display=swap

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0md.min.js

  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.cssass="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="brand-mark">FT</div>
        <div>
          <div class="brand-name">FinanceTrack</div>
          <div class="brand-sub">Personal Ledger</div>
        </div>
      </div>

      <nav class="year-nav">
        <button id="yearPrev" class="yr-arrow" onclick="shiftYear(-1)">‹</button>
        <div id="yearPills" class="year-pills"></div>
        <button id="yearNext" class="yr-arrow" onclick="shiftYear(1)">›</button>
      </nav>

      <div class="filter-control-wrapper">
        <div class="month-filter-container">
          <label for="monthFilter">📅 Month:</label>
          <select id="monthFilter" class="month-select">
            <option value="all">All Months</option>
          </select>
        </div>
      </div>

      <div class="topbar-right">
        <div class="sync-info">
          <span class="live-dot"></span>
          <span id="lastSync" class="sync-text">—</span>
        </div>
        <button id="refreshBtn" class="refresh-btn" onclick="refreshData()">⟳</button>
        <button id="exportBtn" class="export-btn" onclick="exportToCSV()">📎</button>
        <a
          class="log-btn"
          href="https://docs.google.com/forms/d/e/1FAIpQLScr9thxU0S0bnYztKSMQ-nSqD7FmY9IYl9uVYllAf9GJ6aNLA/viewform"
           <main class="page">
    <!-- Loading -->
    <div id="loadingState" class="center-state">
      <div class="loader-ring"></div>
      <p>Fetching your financial history…</p>
      <p class="loading-hint">Make sure your Google Sheet is shared publicly</p>
    </div>

    <!-- Error State -->
    <div id="errorState" class="center-state" style="display: none;">
      <div class="error-icon">⚠️</div>
      <p class="error-title">Could not load data</p>
      <p class="error-message">Check sheet access permissions.</p>
      <button onclick="location.reload()" class="retry-btn">⟳ Try Again</button>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" style="display: none;">
      <div class="view-label-row">
        <div id="viewLabel" class="view-label">—</div>
        <div id="viewDesc" class="view-desc">—</div>
      </div>

      <div id="kpiRow" class="kpi-row"></div>
      <div id="chipRow" class="chip-row"></div>

      <!-- Monthly Chart -->
      <div class="grid-cols g11">
        <div class="card">
          <div class="card-head">
            <span class="card-title">Monthly Cash Flow</span>
            <div id="cashLegend" class="leg-row"></div>
          </div>
          <div class="chart-wrap" style="height: 280px;">
            <canvas id="monthlyChart"></canvas>
          </div>
        </div>
      </div>

      <!-- Category Filters -->
      <div class="category-filter-bar">
        <label for="expenseCategoryFilter">Expense Category:</label>
        <select id="expenseCategoryFilter" class="category-select">
          <option value="all">All Categories</option>
        </select>
      </div>

      <div class="category-filter-bar">
        <label for="incomeCategoryFilter">Income Category:</label>
        <select id="incomeCategoryFilter" class="category-select">
          <option value="all">All Categories</option>
        </select>
      </div>

      <!-- Category Charts -->
      <div class="grid-cols g12">
        <div class="card">
          <div class="card-head">
            <span class="card-title">📊 Expense Breakdown</span>
            <span id="expCatTotal" class="card-sub"></span>
          </div>
          <div class="chart-wrap" style="height: 350px;">
            <canvas id="expenseCatChart"></canvas>
          </div>
        </div>

        <div class="card">
          <div class="card-head">
            <span class="card-title">💰 Income Breakdown</span>
            <span id="incCatTotal" class="card-sub"></span>
          </div>
          <div class="chart-wrap" style="height: 350px;">
            <canvas id="incomeCatChart"></canvas>
          </div>
        </div>
      </div>

      <!-- Daily + Payment Charts -->
      <div class="grid-cols g12">
        <div class="card">
          <div class="card-head"><span class="card-title">📈 Daily Balance Timeline</span></div>
          <div class="chart-wrap" style="height: 250px;">
            <canvas id="dailyBalanceChart"></canvas>
          </div>
        </div>

        <div class="card">
          <div class="card-head"><span class="card-title">💳 Payment Methods</span></div>
          <div class="chart-wrap" style="height: 200px;">
            <canvas id="paymentChart"></canvas>
          </div>
          <div id="paymentLegend" class="donut-leg"></div>
        </div>
      </div>

      <!-- YoY -->
      <div class="card yoy-card">
        <div class="card-head">
          <span class="card-title">Year-over-Year Analysis</span>
          <div id="yoyLegend" class="leg-row"></div>
        </div>
        <div class="chart-wrap" style="height: 400px;">
          <canvas id="yoyChart"></canvas>
        </div>
      </div>

      <!-- Annual -->
      <div class="card">
        <div class="card-head">
          <span class="card-title">Annual Summary</span>
        </div>
        <table class="annual-table">
          <tbody id="annualBody"></tbody>
        </table>
      </div>

      <!-- Transactions -->
      <div class="card">
        <div class="card-head">
          <span class="card-title">Recent Transactions</span>
          <span id="txMeta" class="card-sub"></span>
        </div>
        <table class="tx-table">
          <tbody id="txBody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <div id="toastMessage" class="toast-message"></div>

  script.js</script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      if (typeof boot === "function") boot();
    });
  </script>
</body>
</html>
